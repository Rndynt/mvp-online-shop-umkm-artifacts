    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!--
      Theme bootstrap — synchronous XHR runs BEFORE Vite injects CSS, so
      the custom store colors are applied to inline styles before any pixel
      is painted.  Inline styles beat :root stylesheet rules, eliminating
      the default-teal flash entirely without localStorage.
      Must be a plain <script> (not type="module") so it blocks rendering.
    -->
    <script>
      (function () {
        function hexToHsl(hex) {
          var c = hex.trim().replace(/^#/, '');
          if (c.length === 3) c = c[0]+c[0]+c[1]+c[1]+c[2]+c[2];
          var n = parseInt(c, 16);
          var r = ((n >> 16) & 255) / 255;
          var g = ((n >>  8) & 255) / 255;
          var b = ( n        & 255) / 255;
          var max = Math.max(r,g,b), min = Math.min(r,g,b);
          var h = 0, s = 0, l = (max + min) / 2;
          if (max !== min) {
            var d = max - min;
            s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
            if (max === r) h = (g - b) / d + (g < b ? 6 : 0);
            else if (max === g) h = (b - r) / d + 2;
            else h = (r - g) / d + 4;
            h /= 6;
          }
          return Math.round(h*360)+' '+Math.round(s*100)+'% '+Math.round(l*100)+'%';
        }
        function fg(hex) {
          var c = hex.trim().replace(/^#/, '');
          if (c.length === 3) c = c[0]+c[0]+c[1]+c[1]+c[2]+c[2];
          var n = parseInt(c, 16);
          var lum = (0.299*((n>>16)&255) + 0.587*((n>>8)&255) + 0.114*(n&255)) / 255;
          return lum > 0.62 ? '240 10% 12%' : '0 0% 100%';
        }
        try {
          var xhr = new XMLHttpRequest();
          xhr.open('GET', '/api/admin/settings', false /* synchronous */);
          xhr.send(null);
          if (xhr.status === 200) {
            var d = JSON.parse(xhr.responseText).data;
            if (d) {
              var s = document.documentElement.style;
              if (d.primaryColor) {
                var ph = hexToHsl(d.primaryColor);
                s.setProperty('--primary', ph);
                s.setProperty('--primary-foreground', fg(d.primaryColor));
                s.setProperty('--ring', ph);
                s.setProperty('--sidebar-primary', ph);
                s.setProperty('--sidebar-primary-foreground', fg(d.primaryColor));
                s.setProperty('--sidebar-ring', ph);
                s.setProperty('--chart-1', ph);
              }
              if (d.secondaryColor) {
                var sh = hexToHsl(d.secondaryColor);
                s.setProperty('--secondary', sh);
                s.setProperty('--secondary-foreground', fg(d.secondaryColor));
              }
              if (d.tertiaryColor) {
                var th = hexToHsl(d.tertiaryColor);
                s.setProperty('--accent', th);
                s.setProperty('--accent-foreground', fg(d.tertiaryColor));
                s.setProperty('--sidebar-accent', th);
                s.setProperty('--sidebar-accent-foreground', fg(d.tertiaryColor));
                s.setProperty('--chart-2', th);
              }
            }
          }
        } catch (e) { /* API down or CORS — fall back to CSS defaults */ }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
