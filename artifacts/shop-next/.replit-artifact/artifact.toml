kind = "web"
  previewPath = "/"
  title = "RukoLite Shop (Next.js)"
  version = "1.0.0"
  id = "artifacts/shop-next"
  router = "path"

  [[services]]
  name = "web"
  paths = [ "/" ]
  localPort = 5000

  [services.development]
  run = "pnpm --filter @workspace/shop-next run dev"

  [services.production]
  build = [ "pnpm", "--filter", "@workspace/shop-next", "run", "build" ]
  run = "pnpm --filter @workspace/shop-next run start"

  [services.env]
  PORT = "5000"
  