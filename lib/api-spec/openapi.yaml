openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: RukoLite Online Shop UMKM MVP API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: storefront
    description: Store settings
  - name: catalog
    description: Product catalog
  - name: shipping
    description: Shipping methods
  - name: checkout
    description: Checkout & order creation
  - name: orders
    description: Order management
  - name: admin-products
    description: Admin product management
  - name: admin-orders
    description: Admin order management
  - name: Storage
    description: Object storage upload and serving endpoints.

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /storefront:
    get:
      operationId: getStorefront
      tags: [storefront]
      summary: Get store settings for the storefront
      responses:
        "200":
          description: Store settings
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/StorefrontResponse"
        "404":
          description: Store not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /products:
    get:
      operationId: listProducts
      tags: [catalog]
      summary: List active products
      parameters:
        - in: query
          name: sort
          schema:
            type: string
            enum: [newest, price_asc, price_desc]
          required: false
      responses:
        "200":
          description: Product list
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ProductListItem"

  /products/{slug}:
    get:
      operationId: getProductBySlug
      tags: [catalog]
      summary: Get product detail by slug
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product detail
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/ProductDetail"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /shipping-methods:
    get:
      operationId: listShippingMethods
      tags: [shipping]
      summary: List active shipping methods
      responses:
        "200":
          description: Shipping methods
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ShippingMethod"

  /checkout:
    post:
      operationId: createCheckout
      tags: [checkout]
      summary: Create a new order via checkout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutRequest"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/CheckoutResponse"
        "400":
          description: Validation or business error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/{orderCode}:
    get:
      operationId: getOrderByCode
      tags: [orders]
      summary: Get order by order code
      parameters:
        - in: path
          name: orderCode
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order detail
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/OrderResponse"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/{orderCode}/payment-confirmation:
    post:
      operationId: submitPaymentConfirmation
      tags: [orders]
      summary: Submit payment confirmation for an order
      parameters:
        - in: path
          name: orderCode
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentConfirmationRequest"
      responses:
        "200":
          description: Confirmation submitted
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/PaymentConfirmationResponse"
        "400":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/products:
    get:
      operationId: adminListProducts
      tags: [admin-products]
      summary: List all products (admin)
      responses:
        "200":
          description: Product list
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminProduct"
    post:
      operationId: adminCreateProduct
      tags: [admin-products]
      summary: Create a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminProductInput"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/AdminProduct"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/products/{id}:
    get:
      operationId: adminGetProduct
      tags: [admin-products]
      summary: Get a product by id (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product detail
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/AdminProduct"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: adminUpdateProduct
      tags: [admin-products]
      summary: Update a product
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminProductInput"
      responses:
        "200":
          description: Product updated
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/AdminProduct"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: adminDeleteProduct
      tags: [admin-products]
      summary: Delete a product
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product deleted
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [success]
                    properties:
                      success:
                        type: boolean
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/orders:
    get:
      operationId: adminListOrders
      tags: [admin-orders]
      summary: List all orders (admin)
      parameters:
        - in: query
          name: status
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Order list
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminOrderListItem"

  /admin/orders/{orderCode}:
    get:
      operationId: adminGetOrder
      tags: [admin-orders]
      summary: Get order detail (admin)
      parameters:
        - in: path
          name: orderCode
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order detail
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/OrderResponse"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/orders/{orderCode}/status:
    patch:
      operationId: adminUpdateOrderStatus
      tags: [admin-orders]
      summary: Update order status (admin)
      parameters:
        - in: path
          name: orderCode
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminOrderStatusInput"
      responses:
        "200":
          description: Order status updated
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/OrderResponse"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      description: |
        Returns a presigned GCS URL for direct upload. The client sends JSON
        metadata here, then uploads the file directly to the returned URL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset from PUBLIC_OBJECT_SEARCH_PATHS
      description: |
        Unconditionally public — no authentication or ACL checks.
        Searches PUBLIC_OBJECT_SEARCH_PATHS for the given file path.
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
          description: Relative file path within the public search paths.
      responses:
        '200':
          description: Object content streamed with correct Content-Type.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: File not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Failed to serve public object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      description: |
        Serves object entities uploaded via presigned URLs. These can optionally
        be protected with authentication or ACL checks based on the use case.
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
          description: Object path within the private object dir (e.g. `uploads/some-uuid`).
      responses:
        '200':
          description: Object content streamed with correct Content-Type.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Failed to serve object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    AdminProduct:
      type: object
      required: [id, name, slug, price, stockQuantity, isActive, images, bundles, features, faqs]
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        shortDescription:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        price:
          type: integer
        compareAtPrice:
          type: integer
          nullable: true
        sku:
          type: string
          nullable: true
        stockQuantity:
          type: integer
        isActive:
          type: boolean
        sortOrder:
          type: integer
        images:
          type: array
          items:
            $ref: "#/components/schemas/ProductImage"
        bundles:
          type: array
          items:
            $ref: "#/components/schemas/ProductBundle"
        features:
          type: array
          items:
            $ref: "#/components/schemas/ProductFeature"
        faqs:
          type: array
          items:
            $ref: "#/components/schemas/ProductFaq"

    AdminProductInput:
      type: object
      required: [name, slug, price, stockQuantity]
      properties:
        name:
          type: string
        slug:
          type: string
        shortDescription:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        price:
          type: integer
        compareAtPrice:
          type: integer
          nullable: true
        sku:
          type: string
          nullable: true
        stockQuantity:
          type: integer
        isActive:
          type: boolean
        imageUrl:
          type: string
          nullable: true
        bundles:
          type: array
          items:
            $ref: "#/components/schemas/ProductBundleInput"
        features:
          type: array
          items:
            $ref: "#/components/schemas/ProductFeatureInput"
        faqs:
          type: array
          items:
            $ref: "#/components/schemas/ProductFaqInput"

    ProductBundle:
      type: object
      required: [id, quantity, price, isFeatured, sortOrder]
      properties:
        id:
          type: string
        quantity:
          type: integer
        price:
          type: integer
        label:
          type: string
          nullable: true
        badge:
          type: string
          nullable: true
        isFeatured:
          type: boolean
        sortOrder:
          type: integer

    ProductBundleInput:
      type: object
      required: [quantity, price]
      properties:
        quantity:
          type: integer
        price:
          type: integer
        label:
          type: string
          nullable: true
        badge:
          type: string
          nullable: true
        isFeatured:
          type: boolean

    ProductFeature:
      type: object
      required: [id, title, sortOrder]
      properties:
        id:
          type: string
        imageUrl:
          type: string
          nullable: true
        title:
          type: string
        description:
          type: string
          nullable: true
        sortOrder:
          type: integer

    ProductFeatureInput:
      type: object
      required: [title]
      properties:
        imageUrl:
          type: string
          nullable: true
        title:
          type: string
        description:
          type: string
          nullable: true

    ProductFaq:
      type: object
      required: [id, question, answer, sortOrder]
      properties:
        id:
          type: string
        question:
          type: string
        answer:
          type: string
        sortOrder:
          type: integer

    ProductFaqInput:
      type: object
      required: [question, answer]
      properties:
        question:
          type: string
        answer:
          type: string

    AdminOrderStatusInput:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending_payment, payment_review, paid, processing, shipped, completed, cancelled]

    AdminOrderListItem:
      type: object
      required: [id, orderCode, customerEmail, status, totalAmount, currency, createdAt]
      properties:
        id:
          type: string
        orderCode:
          type: string
        customerEmail:
          type: string
        status:
          type: string
        totalAmount:
          type: integer
        currency:
          type: string
        createdAt:
          type: string
          format: date-time

    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: array
              items: {}

    ProductImage:
      type: object
      required: [id, url, sortOrder]
      properties:
        id:
          type: string
        url:
          type: string
        alt:
          type: string
          nullable: true
        sortOrder:
          type: integer

    ProductListItem:
      type: object
      required: [id, name, slug, price, stockQuantity, images]
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        shortDescription:
          type: string
          nullable: true
        price:
          type: integer
          description: Amount in IDR integer (e.g. 150000 = Rp 150.000)
        compareAtPrice:
          type: integer
          nullable: true
        stockQuantity:
          type: integer
        images:
          type: array
          items:
            $ref: "#/components/schemas/ProductImage"

    ProductDetail:
      type: object
      required: [id, name, slug, price, stockQuantity, images, isActive, bundles, features, faqs]
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        shortDescription:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        price:
          type: integer
        compareAtPrice:
          type: integer
          nullable: true
        stockQuantity:
          type: integer
        images:
          type: array
          items:
            $ref: "#/components/schemas/ProductImage"
        isActive:
          type: boolean
        bundles:
          type: array
          items:
            $ref: "#/components/schemas/ProductBundle"
        features:
          type: array
          items:
            $ref: "#/components/schemas/ProductFeature"
        faqs:
          type: array
          items:
            $ref: "#/components/schemas/ProductFaq"

    ShippingMethod:
      type: object
      required: [id, code, name, price]
      properties:
        id:
          type: string
        code:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        price:
          type: integer

    StorefrontResponse:
      type: object
      required: [id, name, slug, primaryColor, currency, country, activePaymentMethods, activeShippingMethods]
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        logoUrl:
          type: string
          nullable: true
        primaryColor:
          type: string
        secondaryColor:
          type: string
        tertiaryColor:
          type: string
        announcementText:
          type: string
          nullable: true
        homepageTemplate:
          type: string
          description: Template homepage aktif yang dipilih toko
        currency:
          type: string
        country:
          type: string
        tagline:
          type: string
          nullable: true
        addressLine1:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        province:
          type: string
          nullable: true
        postalCode:
          type: string
          nullable: true
        contactEmail:
          type: string
          nullable: true
        contactPhone:
          type: string
          nullable: true
        activePaymentMethods:
          type: array
          items:
            type: string
        activeShippingMethods:
          type: array
          items:
            $ref: "#/components/schemas/ShippingMethod"

    CheckoutItem:
      type: object
      required: [productId, quantity]
      properties:
        productId:
          type: string
        quantity:
          type: integer
          minimum: 1
        bundleId:
          type: string
          nullable: true
          description: Optional bundle ID — when provided the server validates the bundle belongs to the product and uses bundle pricing.

    CheckoutCustomer:
      type: object
      required: [email, phone]
      properties:
        email:
          type: string
          format: email
        phone:
          type: string

    CheckoutShippingAddress:
      type: object
      required: [firstName, lastName, addressLine1, city, province, postalCode, country]
      properties:
        firstName:
          type: string
        lastName:
          type: string
        addressLine1:
          type: string
        addressLine2:
          type: string
        city:
          type: string
        province:
          type: string
        postalCode:
          type: string
        country:
          type: string

    CheckoutRequest:
      type: object
      required: [items, customer, shippingAddress, shippingMethodId, paymentMethod]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CheckoutItem"
          minItems: 1
        customer:
          $ref: "#/components/schemas/CheckoutCustomer"
        shippingAddress:
          $ref: "#/components/schemas/CheckoutShippingAddress"
        shippingMethodId:
          type: string
        paymentMethod:
          type: string
          enum: [manual_fake_qris]
        discountCode:
          type: string

    PaymentInstructionDetail:
      type: object
      required: [title, description, qrPayload, expiresAt]
      properties:
        title:
          type: string
        description:
          type: string
        qrPayload:
          type: string
        expiresAt:
          type: string
          format: date-time

    PaymentInstruction:
      type: object
      required: [method, displayName, status, amount, instruction]
      properties:
        method:
          type: string
        displayName:
          type: string
        status:
          type: string
        amount:
          type: integer
        instruction:
          $ref: "#/components/schemas/PaymentInstructionDetail"

    CheckoutResponse:
      type: object
      required: [orderCode, payment]
      properties:
        orderCode:
          type: string
        payment:
          $ref: "#/components/schemas/PaymentInstruction"

    OrderItem:
      type: object
      required: [id, itemType, nameSnapshot, unitPrice, quantity, lineTotal]
      properties:
        id:
          type: string
        productId:
          type: string
          nullable: true
        itemType:
          type: string
        nameSnapshot:
          type: string
        skuSnapshot:
          type: string
          nullable: true
        unitPrice:
          type: integer
        compareAtPrice:
          type: integer
          nullable: true
        quantity:
          type: integer
        lineTotal:
          type: integer

    OrderAddress:
      type: object
      required: [firstName, lastName, addressLine1, city, province, postalCode, country]
      properties:
        firstName:
          type: string
        lastName:
          type: string
        addressLine1:
          type: string
        addressLine2:
          type: string
          nullable: true
        city:
          type: string
        province:
          type: string
        postalCode:
          type: string
        country:
          type: string

    OrderResponse:
      type: object
      required: [id, orderCode, customerEmail, customerPhone, status, subtotalAmount, discountAmount, shippingAmount, totalAmount, currency, paymentMethod, items, address, payment, createdAt]
      properties:
        id:
          type: string
        orderCode:
          type: string
        customerEmail:
          type: string
        customerPhone:
          type: string
        status:
          type: string
        subtotalAmount:
          type: integer
        discountAmount:
          type: integer
        shippingAmount:
          type: integer
        totalAmount:
          type: integer
        currency:
          type: string
        paymentMethod:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        address:
          $ref: "#/components/schemas/OrderAddress"
        payment:
          $ref: "#/components/schemas/PaymentInstruction"
        createdAt:
          type: string
          format: date-time

    PaymentConfirmationRequest:
      type: object
      required: [payerName]
      properties:
        payerName:
          type: string
        reference:
          type: string
        note:
          type: string

    PaymentConfirmationResponse:
      type: object
      required: [success, paymentStatus]
      properties:
        success:
          type: boolean
        paymentStatus:
          type: string

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
          description: Original file name.
        size:
          type: integer
          minimum: 1
          description: File size in bytes.
        contentType:
          type: string
          minLength: 1
          description: MIME type of the file (e.g. `image/jpeg`).
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
          description: Presigned GCS URL for PUT upload.
        objectPath:
          type: string
          description: Normalized object path (e.g. `/objects/uploads/uuid`). Store this in your database.
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'
